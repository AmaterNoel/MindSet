<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>MindSet Observatory</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <div>
      <p class="eyebrow">NEURAL SYSTEMS / READ-ONLY</p>
      <h1>MindSet Observatory</h1>
    </div>
    <div class="connection"><i></i><span id="connection">正在连接服务器</span></div>
  </header>
  <nav aria-label="主导航">
    <button class="active" data-view="overview">系统概览</button>
    <button data-view="code">代码浏览</button>
    <button data-view="experiments">实验结果</button>
    <button data-view="samples">样本画廊</button>
  </nav>
  <main>
    <section id="overview" class="view active">
      <div class="section-head">
        <div><span class="kicker">LIVE TELEMETRY</span><h2>GPU 集群</h2></div>
        <span class="refresh-note">每 10 秒自动刷新</span>
      </div>
      <div id="gpu-grid" class="gpu-grid skeleton"></div>
      <div class="repo-strip">
        <div><small>服务器</small><strong>zkti</strong></div>
        <div><small>项目</small><strong>MindKeyAnimator</strong></div>
        <div><small>分支</small><strong id="branch">—</strong></div>
        <div><small>提交</small><strong id="commit">—</strong></div>
        <div><small>状态</small><strong id="repo-status">—</strong></div>
      </div>
    </section>

    <section id="code" class="view">
      <div class="split code-layout">
        <aside>
          <div class="pane-title"><span>PROJECT TREE</span><input id="file-filter" placeholder="筛选文件"></div>
          <div id="tree" class="tree"></div>
        </aside>
        <article class="code-pane">
          <div class="pane-title"><span id="code-path">选择文件查看代码</span><span class="readonly">READ ONLY</span></div>
          <pre><code id="code-content">从左侧项目树选择一个文本文件。</code></pre>
        </article>
      </div>
    </section>

    <section id="experiments" class="view">
      <div class="section-head">
        <div><span class="kicker">TRAINING SIGNALS</span><h2>损失与指标</h2></div>
        <select id="run-select" aria-label="选择实验"></select>
      </div>
      <div class="metrics-layout">
        <article class="chart-card">
          <div id="metric-toggles" class="metric-toggles"></div>
          <svg id="chart" viewBox="0 0 1100 420" role="img" aria-label="训练指标曲线"></svg>
        </article>
        <aside class="summary-card"><h3>最终指标</h3><div id="metric-summary"></div></aside>
      </div>
    </section>

    <section id="samples" class="view">
      <div class="section-head">
        <div><span class="kicker">FIXED COHORTS</span><h2>固定样本可视化</h2></div>
        <div class="split-tabs"><button class="active" data-split="train">Train</button><button data-split="val">Val</button><button data-split="test">Test</button></div>
      </div>
      <p class="sample-note">推荐约定：每次实验将固定样本写入 <code>samples/{train|val|test}/</code>，文件名包含样本编号。</p>
      <div id="gallery" class="gallery"></div>
    </section>
  </main>
  <div id="toast" role="status"></div>
  <script src="/app.js"></script>
</body>
</html>
